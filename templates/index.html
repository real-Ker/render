<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        display: flex;
    }

    /* 左：command */
    .left {
        width: 25%;
        padding: 30px;
        border-right: 2px solid #ccc;
    }

    /* 中：data */
    .middle {
        width: 45%;
        padding: 20px;
        overflow-y: auto;
        height: 100vh;
        border-right: 2px solid #ccc;
    }

    /* 右：3D */
    .right {
        width: 30%;
        padding: 20px;
        height: 100vh;
    }

    /* 3D容器必须撑满 */
    #modelView {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
    }

    input, select, button {
        display: block;
        margin: 10px 0;
        padding: 8px;
        font-size: 16px;
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
    }

    .label {
        width: 120px;
        font-weight: bold;
    }

    .charts {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .chart-wrapper {
        position: relative;
        min-width: 280px;
        min-height: 260px;
        border: 1px solid #ddd;
        padding: 10px;
        background: white;
        box-sizing: border-box;
    }

    .data-row {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    border-bottom: 1px solid #eee;
    padding-bottom: 20px;
    }

    /* 左侧信息 */
    .info-panel {
        width: 220px;
        font-size: 14px;
        background: #fafafa;
        padding: 10px;
        border: 1px solid #ddd;
    }

    .info-panel div {
        margin-bottom: 6px;
    }

    /* 右侧图 */
    .chart-panel {
        flex: 1;
        display: flex;
        gap: 20px;
    }

    .chart-box {
        flex: 1;
        min-height: 260px;
        border: 1px solid #ddd;
        padding: 10px;
        background: white;
    }
</style>
</head>

<body>

<!-- 左侧控制 -->
<div class="left">
    <h1>Control Panel</h1>

    <label>Horizontal Rotation Angle (0–180, multiple of 10)</label>
    <input type="number" id="hrs" min="0" max="180" step="10">

    <label>Vertical Rotation Angle (0–180, multiple of 10)</label>
    <input type="number" id="vrs" min="0" max="180" step="10">

    <label>S (Shutdown)</label>
    <select id="shutdown">
        <option>No</option>
        <option>Yes</option>
    </select>

    <button onclick="startMeasurement()">Start Measurement</button>
</div>

<!-- 中间数据 -->
<div class="middle">
    <h1>Measured Data</h1>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="downloadJSON()">Download Data</button>
        <button onclick="clearData()">Clear Data</button>
    </div>
    <div id="chartsContainer"></div>
</div>

<!-- 右侧模型 -->
<div class="right">
    <h1>3D Model</h1>
    <div id="modelView" style="width:100%; height:300px; border:1px solid #ccc;"></div>
</div>

<script>

// ================= 控制部分 =================

// 标志位：确保完成提示只触发一次
let measurementCompleted = false;
let currentSession = 0;

function validateInput(v) {
    return v >= 0 && v <= 180 && v % 10 === 0;
}

function startMeasurement() {
    currentSession++;
    // 重置标志位，允许新的测量周期
    measurementCompleted = false;
    let vrs = parseInt(document.getElementById("vrs").value) + 10;
    let hrs = parseInt(document.getElementById("hrs").value) + 10;
    let shutdown = document.getElementById("shutdown").value;

    if (!validateInput(vrs) || !validateInput(hrs)) {
        alert("VRS and HRS must be between 0 and 180 and must be multiples of 10!");
        return;
    }

    let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
    let blob = new Blob([csv], {type:"text/csv"});

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "command.csv";
    link.click();
    
    let formData = new FormData();
    formData.append("file", blob, "command.csv");

    fetch("https://render-er7w.onrender.com/upload", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }
        return response.text();
    })
    .then(data => {
        console.log("Uploaded:", data);
        alert("Upload success!");
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Upload success!");
    });
}

// ================= 数据绘图部分 =================
// 保存所有 chart 实例
let chartMap = {};

async function fetchData() {
    try {
        let res = await fetch("/data?ts=" + Date.now()); // 防缓存
        if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
        }
        let json = await res.json();
        console.log("Data fetched successfully:", json);
        if (json && json.length > 0) {
            processData(json);
        } else {
            console.log("No data received or empty data array");
        }
    } catch (e) {
        console.log("Error fetching data:", e);
    }
}

function processData(data) {

    let groups = {};

    data.forEach(row => {
        if(
            row.Target_H === undefined || 
            row.Target_V === undefined || 
            row.H === undefined || 
            row.V === undefined ||
            row.Frequency_Hz === undefined
        ) {
            return; // 跳过缺失关键字段的行
        }


        let Target_H = row.Target_H;
        let Target_V = row.Target_V;
        let H = row.H;
        let V = row.V;
        let F = row.Frequency_Hz / 1e9; // 转成 GHz
        let S11_M = row.S11_Mag_dB;
        // let S11_P = row.S11_Phase;
        let S21_M = row.S21_Mag_dB;
        // let S21_P = row.S21_Phase;

        let key = `S${currentSession}_${Target_H}_${Target_V}_${H}_${V}`;

        if (!groups[key]) {
            groups[key] = {
                session: currentSession,
                Target_H, Target_V, H, V,
                freq: [],
                s11_m:[],
                // s11_p:[],
                s21_m:[],
                // s21_p:[]
            };
        }

        let g = groups[key];

        // 添加数据点
        if (F !== 0 || S11_M !== 0 || S21_M !== 0) {
            g.freq.push(F);
            g.s11_m.push(S11_M);
            g.s21_m.push(S21_M);
            // g.s11_p.push(S11_P);
            // g.s21_p.push(S21_P);
        }

        let last = data[data.length - 1];

        if (last) {
            updateModelRotationFromData(
                last.V,
                last.H
            );
            
            // 检查是否到达目标位置（仅触发一次）
            if (!measurementCompleted && last.H === last.Target_H && last.V === last.Target_V) {
                measurementCompleted = true; // 设置标志位，防止重复触发
                console.log("Measurement complete! H=" + last.H + ", V=" + last.V);
                
                // 自动下载数据
                downloadJSON();
                
                // 弹出提示框
                alert("Measurement complete!\nData has been downloaded automatically.\n\nTarget position: H=" + last.Target_H + ", V=" + last.Target_V);

                // 自动清空数据
                clearDataAfterMeasurement();
            }
        }
    });

    renderCharts(groups);
}

function renderCharts(groups) {

    let container = document.getElementById("chartsContainer");

    Object.values(groups).forEach((g) => {

        let key = `S${g.session}_${g.Target_H}_${g.Target_V}_${g.H}_${g.V}`;

        // =====================================================
        // 第一次创建 DOM
        // =====================================================
        if (!chartMap[key]) {

            let row = document.createElement("div");
            row.className = "data-row";
            row.id = "row_" + key;

            // ================= 左侧信息 =================
            let info = document.createElement("div");
            info.className = "info-panel";
            info.id = "info_" + key;

            // ================= 右侧图 =================
            let chartPanel = document.createElement("div");
            chartPanel.className = "chart-panel";

            // S11
            let box1 = document.createElement("div");
            box1.className = "chart-box";

            let c1 = document.createElement("canvas");
            box1.appendChild(c1);

            // S21
            let box2 = document.createElement("div");
            box2.className = "chart-box";

            let c2 = document.createElement("canvas");
            box2.appendChild(c2);

            chartPanel.appendChild(box1);
            chartPanel.appendChild(box2);

            row.appendChild(info);
            row.appendChild(chartPanel);

            container.appendChild(row);

            // 创建 chart
            let chart1 = createChart(c1, "S11 Magnitude (dB)");
            let chart2 = createChart(c2, "S21 Magnitude (dB)");

            chartMap[key] = {
                info,
                chart1,
                chart2
            };
        }

        // =====================================================
        // 更新信息
        // =====================================================

        chartMap[key].info.innerHTML = `
            <div><b>Command</b></div>
            <div>Horizontal Rotation Angle: ${g.Target_H}</div>
            <div>Vertical Rotation Angle: ${g.Target_V}</div>
            <hr>
            <div><b>Measured</b></div>
            <div>Horizontal Rotation Angle: ${g.H}</div>
            <div>Vertical Rotation Angle: ${g.V}</div>
        `;

        // =====================================================
        // 更新 Chart 数据（重点）
        // =====================================================

        let labels = g.freq.map(f => f.toFixed(2));

        let chart1 = chartMap[key].chart1;
        chart1.data.labels = labels;
        chart1.data.datasets[0].data = g.s11_m;
        chart1.update('none');

        let chart2 = chartMap[key].chart2;
        chart2.data.labels = labels;
        chart2.data.datasets[0].data = g.s21_m;
        chart2.update('none');
    });
}

function createChart(canvas, title) {

    return new Chart(canvas, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                fill: false,
                tension: 0,
                borderColor: 'rgb(75, 192, 192)',
                backgroundColor: 'rgba(75, 192, 192, 0.1)',
                pointRadius: 0,
                pointHoverRadius: 3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,

            // 关键：关闭动画
            animation: false,

            layout:{
                padding: {
                    left: 20,
                    right: 10,
                    top: 10,
                    bottom: 10
                }
            },

            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: title
                }
            },

            scales: {
                x: {
                    display: true,
                    title: {
                        display: true,
                        text: 'Frequency (GHz)'
                    }
                },

                y: {
                    display: true,
                    title: {
                        display: true,
                        text: title
                    }
                }
            }
        }
    });
}

// ================= 下载数据 =================

async function downloadJSON() {
    try {
        let res = await fetch('/data?ts=' + Date.now());
        let data = await res.json();

        // 转成字符串
        let jsonStr = JSON.stringify(data, null, 2);

        // 创建 Blob
        let blob = new Blob([jsonStr], { type: "application/json" });

        // 创建下载链接
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        let now = new Date();
        let filename = `data_${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}.json`;
        link.download = filename;

        // 触发下载
        link.click();

    } catch (e) {
        console.error("Download failed:", e);
        alert("Download failed");
    }
}

// ================= 清空数据 =================

async function clearData() {
    // 防止误操作
    let confirmClear = confirm("Are you sure you want to clear all measured data?");

    if (!confirmClear) return;

    try {
        let res = await fetch('/clear-data', {
            method: 'POST'
        });

        if (!res.ok) {
            throw new Error("Failed to clear data");
        }

        // 清空前端图表
        document.getElementById("chartsContainer").innerHTML = "";

        // 清空 chartMap
        chartMap = {};

        alert("Data cleared successfully!");

    } catch (e) {
        console.error(e);
        alert("Failed to clear data");
    }
}

async function clearDataAfterMeasurement() {
    try {
        let res = await fetch('/clear-data', {
            method: 'POST'
        });

        if (!res.ok) {
            throw new Error("Failed to clear data");
        }

        // 清空页面图表
        document.getElementById("chartsContainer").innerHTML = "";

        // 清空 chartMap
        chartMap = {};

        console.log("Measurement data cleared");

    } catch (e) {

        console.error(e);
        alert("Failed to auto clear data");
    }
}
    
// ================= 自动轮询 =================

async function polling() {
    await fetchData();
    setTimeout(polling, 3000);
}

window.onload = () => {
    polling();
};

</script>

<script type="module">
// ================= 3D轮询 =================

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const container = document.getElementById("modelView");

// ===== 场景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// ===== 相机 =====
const camera = new THREE.PerspectiveCamera(
    60,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
);

// ===== 固定相机（一次性计算）=====
function setupFixedCamera() {

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const maxDim = Math.max(size.x, size.y, size.z);

    const fov = camera.fov * (Math.PI / 180);
    let distance = maxDim / 2 / Math.tan(fov / 2);

    // 关键：给更大的冗余（保证旋转不出框）
    distance *= 2.2;

    // 固定一个“观察角度”（不要用 normalize 动态算）
    camera.position.set(distance, distance * 0.8, distance);

    camera.lookAt(center);
}

// ===== 渲染器 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// ===== 光 =====
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ======================================================
//  ① VRS轴（底部水平轴）
// ======================================================
const basePivot = new THREE.Group();
basePivot.position.set(0, 0, 0); // 地面位置
scene.add(basePivot);

// ======================================================
//  ② HRS轴（T中轴）
// ======================================================
const hrsPivot = new THREE.Group();
hrsPivot.position.set(0, 1, 0); // T 的底部到中轴高度
basePivot.add(hrsPivot);

// ======================================================
//  ③ 模型主体
// ======================================================
const model = new THREE.Group();
hrsPivot.add(model);

// ===== 坐标轴辅助线 =====
const axesHelper = new THREE.AxesHelper(3);
scene.add(axesHelper);

// ===== 材质 =====
const metal = new THREE.MeshStandardMaterial({ color: 0x888888 });
const shellMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0 });

// ===== T竖杆 =====
const vertical = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 2, 0.2),
    metal
);
vertical.position.set(0, 1, 0);
model.add(vertical);

// ===== T横杆 =====
const horizontal = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.3, 0.2),
    metal
);
horizontal.position.set(0, 2, 0);
model.add(horizontal);

// ===== 两个壳（对称）=====
function createShell(x) {
    const shell = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.5, 0.4),
        shellMat
    );
    shell.position.set(x, 2, 0.3); // 在同一面（+Z）
    return shell;
}

model.add(createShell(0.6));
model.add(createShell(-0.6));

// ======================================================
//  控制旋转
// ======================================================
// function updateRotation() {
//     let vrs = parseFloat(document.getElementById("vrs").value) || 0;
//     let hrs = parseFloat(document.getElementById("hrs").value) || 0;

//     basePivot.rotation.x = vrs * Math.PI / 180;
//     hrsPivot.rotation.y = hrs * Math.PI / 180;
// }

// document.getElementById("vrs").addEventListener("input", updateRotation);
// document.getElementById("hrs").addEventListener("input", updateRotation);

window.updateModelRotationFromData = function(vrs, hrs) {
    basePivot.rotation.x = vrs * Math.PI / 180;
    hrsPivot.rotation.y = (-hrs) * Math.PI / 180;
};

// 初始化时调整一次相机
setupFixedCamera();

// ===== 渲染 =====
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// 自适应
window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>

</body>
</html>
