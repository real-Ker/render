<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        display: flex;
    }

    .left {
        width: 30%;
        padding: 30px;
        border-right: 2px solid #ccc;
    }

    .right {
        width: 70%;
        padding: 20px;
        overflow-y: auto;
        height: 100vh;
    }

    input, select, button {
        display: block;
        margin: 10px 0;
        padding: 8px;
        font-size: 16px;
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
    }

    .label {
        width: 120px;
        font-weight: bold;
    }

    .charts {
        display: flex;
        gap: 20px;
    }

    canvas {
        width: 250px !important;
        height: 200px !important;
    }
</style>
</head>

<body>

<!-- 左侧控制 -->
<div class="left">
    <h1>Control Panel</h1>

    <label>VRS (0–180, multiple of 10)</label>
    <input type="number" id="vrs" min="0" max="180" step="10">

    <label>HRS (0–180, multiple of 10)</label>
    <input type="number" id="hrs" min="0" max="180" step="10">

    <label>S (Shutdown)</label>
    <select id="shutdown">
        <option>No</option>
        <option>Yes</option>
    </select>

    <button onclick="startMeasurement()">Start Measurement</button>
</div>

<!-- 右侧数据 -->
<div class="right">
    <h1>Measured Data</h1>
    <div id="chartsContainer"></div>
</div>

<script>

// ================= 控制部分 =================

function validateInput(v) {
    return v >= 0 && v <= 180 && v % 10 === 0;
}

function startMeasurement() {
    let vrs = parseInt(vrsInput.value);
    let hrs = parseInt(hrsInput.value);
    let shutdown = shutdownSelect.value;

    if (!validateInput(vrs) || !validateInput(hrs)) {
        alert("Invalid input!");
        return;
    }

    let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
    let blob = new Blob([csv], {type:"text/csv"});

    let formData = new FormData();
    formData.append("file", blob, "command.csv");

    fetch("https://render-er7w.onrender.com/upload", {
        method: "POST",
        body: formData
    }).then(()=>alert("Uploaded"));
}

// ================= 数据绘图部分 =================

async function fetchData() {
    try {
        let res = await fetch("/data?ts=" + Date.now()); // 防缓存
        let json = await res.json();
        processData(json);
    } catch (e) {
        console.log("No data yet");
    }
}

function processData(data) {

    let groups = {};

    data.forEach(row => {
        let H = row.H;
        let V = row.V;
        let F = row.Frequency_Hz;
        let S21 = row.S21_dB;
        let D2 = row.Data2;

        let key = `${H}_${V}`;

        if (!groups[key]) {
            groups[key] = {
                H, V,
                x: [],       // 统一x轴（index）
                freq: [],
                s21: [],
                d2: []
            };
        }

        let g = groups[key];

        // 情况1：正常测量点
        if (F !== 0) {
            g.x.push(g.x.length);   // index
            g.freq.push(F);
            g.s21.push(S21);
        }

        // 情况2：Data2（MLOG）
        if (D2 !== 0) {
            g.d2.push(D2);
        }
    });

    renderCharts(groups);
}

function renderCharts(groups) {
    let container = document.getElementById("chartsContainer");
    container.innerHTML = "";

    Object.values(groups).forEach((g, idx) => {

        let row = document.createElement("div");
        row.className = "row";

        let label = document.createElement("div");
        label.className = "label";
        label.innerText = `VRS:${g.H} HRS:${g.V}`;

        let charts = document.createElement("div");
        charts.className = "charts";

        let c1 = document.createElement("canvas");
        let c2 = document.createElement("canvas");
        let c3 = document.createElement("canvas");

        charts.appendChild(c1);
        charts.appendChild(c2);
        charts.appendChild(c3);

        row.appendChild(label);
        row.appendChild(charts);
        container.appendChild(row);

        drawChart(c1, g.x, g.freq, "Frequency (Hz)");
        drawChart(c2, g.x, g.s21, "S21 (dB)");
        drawChart(c3, null, g.d2, "Data2 (MLOG)");
    });
}

function drawChart(canvas, x, y, title) {

    // 如果没有 x，就自动生成序号
    if (!x || x.length === 0) {
        x = y.map((_, i) => i);
    }

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: x,
            datasets: [{
                data: y,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: title
                }
            },
            scales: {
                x: { display: true }
            }
        }
    });
}

// ================= 自动轮询 =================

fetchData();
// 每5秒检查一次新数据
setInterval(fetchData, 5000);

</script>

</body>
</html>
