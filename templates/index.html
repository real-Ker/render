<script type="module">
    import * as THREE from 'three';

    // ================= 3D 模型部分 =================
    const container = document.getElementById("modelView");
    
    // 获取容器尺寸
    const width = container.clientWidth;
    const height = container.clientHeight;

    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050b1a);
    scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

    // 相机
    const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 100);
    camera.position.set(4, 3, 6);
    camera.lookAt(0, 1.5, 0);

    // 渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // 轨道控制（需要额外导入，但为了保持简洁，手动实现简单旋转？不，直接使用 OrbitControls）
    // 由于 import map 只导入了 three，需要动态导入 OrbitControls
    import('https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js').then(({ OrbitControls }) => {
        window.controls = new OrbitControls(camera, renderer.domElement);
        window.controls.enableDamping = true;
        window.controls.dampingFactor = 0.05;
        window.controls.autoRotate = false;
        window.controls.enableZoom = true;
        window.controls.enablePan = true;
        window.controls.target.set(0, 1.5, 0);
    });

    // 光源系统
    // 环境光
    const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
    scene.add(ambientLight);
    
    // 半球光
    const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
    scene.add(hemisphereLight);
    
    // 主光源方向光
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(2, 5, 3);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    scene.add(dirLight);
    
    // 辅助背光暖色
    const backLight = new THREE.DirectionalLight(0xffaa66, 0.5);
    backLight.position.set(-2, 1, -3);
    scene.add(backLight);
    
    // 冷色填充光
    const fillLight = new THREE.PointLight(0x4488ff, 0.35);
    fillLight.position.set(1, 1, 2);
    scene.add(fillLight);
    
    // 底部柔光
    const fillUp = new THREE.PointLight(0x88aaff, 0.25);
    fillUp.position.set(0, -1, 0);
    scene.add(fillUp);

    // 辅助网格地面
    const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
    gridHelper.position.y = -1.0;
    scene.add(gridHelper);
    
    // 简单反射平面
    const planeMat = new THREE.MeshStandardMaterial({ color: 0x2266aa, roughness: 0.3, metalness: 0.5, transparent: true, opacity: 0.15 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), planeMat);
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = -1.05;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);

    // 星空粒子背景
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1200;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 400;
        starPositions[i*3+1] = (Math.random() - 0.5) * 120;
        starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 60;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // ===== 创建散射计模型 =====
    
    // 基座
    const base = new THREE.Mesh(
        new THREE.BoxGeometry(3, 0.5, 2),
        new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.4, roughness: 0.5 })
    );
    base.position.y = -0.5;
    base.castShadow = true;
    base.receiveShadow = true;
    scene.add(base);
    
    // 基座装饰环
    const baseRing = new THREE.Mesh(
        new THREE.TorusGeometry(1.6, 0.08, 32, 100),
        new THREE.MeshStandardMaterial({ color: 0x3a86ff, metalness: 0.8 })
    );
    baseRing.rotation.x = Math.PI / 2;
    baseRing.position.y = -0.25;
    scene.add(baseRing);

    // 立柱
    const column = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 2.2, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.6, roughness: 0.3 })
    );
    column.position.set(0, 0.7, 0);
    column.castShadow = true;
    scene.add(column);
    
    // 立柱顶部圆盘
    const topDisc = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6, 0.6, 0.15, 32),
        new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7 })
    );
    topDisc.position.set(0, 1.75, 0);
    topDisc.castShadow = true;
    scene.add(topDisc);

    // 旋转臂组（关键：实现VRS和HRS控制）
    const armGroup = new THREE.Group();
    armGroup.position.set(0, 1.9, 0); // pivot 点
    scene.add(armGroup);

    // 水平旋转臂
    const armHorizontal = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.15, 0.25),
        new THREE.MeshStandardMaterial({ color: 0xff5555, metalness: 0.5, emissive: 0x331100 })
    );
    armHorizontal.position.set(1.1, 0, 0);
    armHorizontal.castShadow = true;
    armGroup.add(armHorizontal);
    
    // 垂直臂（连接探头的部分）
    const armVertical = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 0.5, 0.2),
        new THREE.MeshStandardMaterial({ color: 0xff7777 })
    );
    armVertical.position.set(2.1, -0.2, 0);
    armVertical.castShadow = true;
    armGroup.add(armVertical);

    // 探头（传感器）
    const sensor = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.22, 0.6, 32),
        new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.8, emissive: 0x004466 })
    );
    sensor.rotation.z = Math.PI / 2;
    sensor.position.set(2.35, -0.2, 0);
    sensor.castShadow = true;
    armGroup.add(sensor);
    
    // 探头前端小球
    const sensorTip = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 })
    );
    sensorTip.position.set(2.65, -0.2, 0);
    armGroup.add(sensorTip);
    
    // 添加一些装饰性的小灯
    const ledLight = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff3300, emissiveIntensity: 0.5 })
    );
    ledLight.position.set(0.5, 0.2, 0.3);
    armGroup.add(ledLight);

    // ===== 控制旋转（VRS和HRS联动3D模型）=====
    function updateRotation() {
        let vrs = parseInt(document.getElementById("vrs").value) || 0;
        let hrs = parseInt(document.getElementById("hrs").value) || 0;
        
        // VRS: 垂直旋转 (绕Y轴) - 控制整个臂组的水平旋转
        // HRS: 水平旋转 (绕X轴) - 控制臂组的俯仰
        armGroup.rotation.y = vrs * Math.PI / 180;
        armGroup.rotation.x = hrs * Math.PI / 180;
    }
    
    // 监听输入变化
    document.getElementById("vrs").addEventListener("input", updateRotation);
    document.getElementById("hrs").addEventListener("input", updateRotation);
    
    // 初始化旋转
    updateRotation();

    // 添加一个简单的辅助轴线（帮助理解方向）
    const axesHelper = new THREE.AxesHelper(3);
    axesHelper.material.transparent = true;
    axesHelper.material.opacity = 0.12;
    scene.add(axesHelper);

    // ===== 渲染循环 =====
    function animate() {
        requestAnimationFrame(animate);
        // 更新轨道控制
        if (window.controls) {
            window.controls.update();
        }
        renderer.render(scene, camera);
    }
    animate();
    
    // 窗口尺寸自适应
    window.addEventListener('resize', () => {
        const newWidth = container.clientWidth;
        const newHeight = container.clientHeight;
        camera.aspect = newWidth / newHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(newWidth, newHeight);
    });
    
    // 简单的 ResizeObserver 备用
    const resizeObserver = new ResizeObserver(() => {
        const newWidth = container.clientWidth;
        const newHeight = container.clientHeight;
        camera.aspect = newWidth / newHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(newWidth, newHeight);
    });
    resizeObserver.observe(container);
    
    console.log("3D模型已加载，VRS/HRS控制生效");
</script>

<script>
    // ================= 控制部分 =================

    function validateInput(v) {
        return v >= 0 && v <= 180 && v % 10 === 0;
    }

    function startMeasurement() {
        let vrs = parseInt(document.getElementById("vrs").value);
        let hrs = parseInt(document.getElementById("hrs").value);
        let shutdown = document.getElementById("shutdown").value;

        if (!validateInput(vrs) || !validateInput(hrs)) {
            alert("VRS and HRS must be between 0 and 180 and must be multiples of 10!");
            return;
        }

        let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
        let blob = new Blob([csv], {type:"text/csv"});

        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "command.csv";
        link.click();

        let formData = new FormData();
        formData.append("file", blob, "command.csv");

        fetch("https://render-er7w.onrender.com/upload", {
            method: "POST",
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            console.log("Uploaded:", data);
            alert("Upload success!");
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Upload failed! 但CSV文件已保存到本地。");
        });
    }

    // ================= 数据绘图部分 =================
    // 使用模拟数据演示（因为真实接口需要后端）
    let mockDataStore = [];
    
    function generateMockData() {
        const data = [];
        const pairs = [[0,0], [30,20], [60,40], [90,60]];
        pairs.forEach(pair => {
            for (let i = 0; i < 8; i++) {
                data.push({
                    H: pair[0],
                    V: pair[1],
                    Frequency_Hz: 800 + i * 50 + Math.random() * 20,
                    S21_dB: -30 + Math.sin(i) * 12 + (Math.random() * 4 - 2),
                    Data2: Math.random() > 0.6 ? (20 + Math.random() * 50) : 0
                });
            }
        });
        return data;
    }
    
    mockDataStore = generateMockData();
    
    // 模拟数据刷新
    setInterval(() => {
        const newPoint = {
            H: [0,30,60,90][Math.floor(Math.random() * 4)],
            V: [0,20,40,60][Math.floor(Math.random() * 4)],
            Frequency_Hz: 800 + Math.random() * 400,
            S21_dB: -25 + Math.sin(Date.now() / 5000) * 10 + (Math.random() * 3),
            Data2: Math.random() > 0.7 ? (15 + Math.random() * 45) : 0
        };
        newPoint.S21_dB = parseFloat(newPoint.S21_dB.toFixed(2));
        newPoint.Data2 = parseFloat(newPoint.Data2.toFixed(1));
        newPoint.Frequency_Hz = Math.round(newPoint.Frequency_Hz);
        
        const existingIndex = mockDataStore.findIndex(d => 
            d.H === newPoint.H && d.V === newPoint.V && Math.abs(d.Frequency_Hz - newPoint.Frequency_Hz) < 30
        );
        if (existingIndex !== -1) {
            mockDataStore[existingIndex] = newPoint;
        } else {
            mockDataStore.push(newPoint);
        }
        
        processData(mockDataStore);
    }, 5000);

    async function fetchData() {
        // 使用模拟数据替代真实接口
        processData(mockDataStore);
    }

    function processData(data) {
        let groups = {};

        data.forEach(row => {
            let H = row.H;
            let V = row.V;
            let F = row.Frequency_Hz;
            let S21 = row.S21_dB;
            let D2 = row.Data2;

            let key = `${H}_${V}`;

            if (!groups[key]) {
                groups[key] = {
                    H, V,
                    x: [],
                    freq: [],
                    s21: [],
                    d2: []
                };
            }

            let g = groups[key];

            if (F !== 0) {
                g.x.push(g.x.length);
                g.freq.push(F);
                g.s21.push(S21);
            }

            if (D2 !== 0) {
                g.d2.push(D2);
            }
        });

        renderCharts(groups);
    }

    function renderCharts(groups) {
        let container = document.getElementById("chartsContainer");
        container.innerHTML = "";

        Object.values(groups).forEach((g, idx) => {
            let row = document.createElement("div");
            row.className = "row";

            let label = document.createElement("div");
            label.className = "label";
            label.innerText = `📡 VRS:${g.H}  HRS:${g.V}`;

            let charts = document.createElement("div");
            charts.className = "charts";

            let c1 = document.createElement("canvas");
            let c2 = document.createElement("canvas");
            let c3 = document.createElement("canvas");

            charts.appendChild(c1);
            charts.appendChild(c2);
            charts.appendChild(c3);

            row.appendChild(label);
            row.appendChild(charts);
            container.appendChild(row);

            drawChart(c1, g.x, g.freq, "Frequency (Hz)");
            drawChart(c2, g.x, g.s21, "S21 (dB)");
            drawChart(c3, null, g.d2, "Data2 (MLOG)");
        });
    }

    function drawChart(canvas, x, y, title) {
        if (!y || y.length === 0) {
            new Chart(canvas, {
                type: 'line',
                data: { labels: [0], datasets: [{ data: [0] }] },
                options: { plugins: { title: { display: true, text: title + " (无数据)" } } }
            });
            return;
        }
        
        if (!x || x.length === 0) {
            x = y.map((_, i) => i);
        }

        new Chart(canvas, {
            type: 'line',
            data: {
                labels: x,
                datasets: [{
                    data: y,
                    fill: false,
                    tension: 0.1,
                    borderColor: '#3a86ff',
                    backgroundColor: 'transparent'
                }]
            },
            options: {
                responsive: false,
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: title,
                        color: '#ccc'
                    }
                },
                scales: {
                    x: { display: true, ticks: { color: '#aaa' } },
                    y: { ticks: { color: '#aaa' } }
                }
            }
        });
    }

    // ================= 下载数据 =================

    async function downloadJSON() {
        // 下载模拟数据（或真实数据）
        let jsonStr = JSON.stringify(mockDataStore, null, 2);
        let blob = new Blob([jsonStr], { type: "application/json" });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        let now = new Date();
        let filename = `data_${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}.json`;
        link.download = filename;
        link.click();
    }
    
    // ================= 自动轮询 =================
    window.onload = () => {
        fetchData();
        setInterval(fetchData, 3000);
    };
</script>

</body>
</html>
