<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        display: flex;
    }

    /* 左：command */
    .left {
        width: 25%;
        padding: 30px;
        border-right: 2px solid #ccc;
    }

    /* 中：data */
    .middle {
        width: 45%;
        padding: 20px;
        overflow-y: auto;
        height: 100vh;
        border-right: 2px solid #ccc;
    }

    /* 右：3D */
    .right {
        width: 30%;
        padding: 20px;
        height: 100vh;
    }

    /* 3D容器必须撑满 */
    #modelView {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
    }

    input, select, button {
        display: block;
        margin: 10px 0;
        padding: 8px;
        font-size: 16px;
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
    }

    .label {
        width: 120px;
        font-weight: bold;
    }

    .charts {
        display: flex;
        gap: 20px;
    }

    canvas {
        width: 250px !important;
        height: 200px !important;
    }
</style>
</head>

<body>

<!-- 左侧控制 -->
<div class="left">
    <h1>Control Panel</h1>

    <label>VRS (0–180, multiple of 10)</label>
    <input type="number" id="vrs" min="0" max="180" step="10">

    <label>HRS (0–180, multiple of 10)</label>
    <input type="number" id="hrs" min="0" max="180" step="10">

    <label>S (Shutdown)</label>
    <select id="shutdown">
        <option>No</option>
        <option>Yes</option>
    </select>

    <button onclick="startMeasurement()">Start Measurement</button>
</div>

<!-- 中间数据 -->
<div class="middle">
    <h1>Measured Data</h1>
    <button onclick="downloadJSON()">Download Data</button>
    <div id="chartsContainer"></div>
</div>

<!-- 右侧模型 -->
<div class="right">
    <h1>3D Model</h1>
    <div id="modelView" style="width:100%; height:300px; border:1px solid #ccc;"></div>
</div>

<script>

// ================= 控制部分 =================

function validateInput(v) {
    return v >= 0 && v <= 180 && v % 10 === 0;
}

function startMeasurement() {
    let vrs = parseInt(document.getElementById("vrs").value);
    let hrs = parseInt(document.getElementById("hrs").value);
    let shutdown = document.getElementById("shutdown").value;

    if (!validateInput(vrs) || !validateInput(hrs)) {
        alert("VRS and HRS must be between 0 and 180 and must be multiples of 10!");
        return;
    }

    let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
    let blob = new Blob([csv], {type:"text/csv"});

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "command.csv";
    link.click();
    
    let formData = new FormData();
    formData.append("file", blob, "command.csv");

    fetch("https://render-er7w.onrender.com/upload", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }
        return response.text();
    })
    .then(data => {
        console.log("Uploaded:", data);
        alert("Upload success!");
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Upload failed!");
    });
}

// ================= 数据绘图部分 =================

async function fetchData() {
    try {
        let res = await fetch("/data?ts=" + Date.now()); // 防缓存
        let json = await res.json();
        processData(json);
    } catch (e) {
        console.log("No data yet");
    }
}

function processData(data) {

    let groups = {};

    data.forEach(row => {
        let H = row.H;
        let V = row.V;
        let F = row.Frequency_Hz;
        let S21 = row.S21_dB;
        let D2 = row.Data2;

        let key = `${H}_${V}`;

        if (!groups[key]) {
            groups[key] = {
                H, V,
                x: [],       // 统一x轴（index）
                freq: [],
                s21: [],
                d2: []
            };
        }

        let g = groups[key];

        // 情况1：正常测量点
        if (F !== 0) {
            g.x.push(g.x.length);   // index
            g.freq.push(F);
            g.s21.push(S21);
        }

        // 情况2：Data2（MLOG）
        if (D2 !== 0) {
            g.d2.push(D2);
        }
    });

    renderCharts(groups);
}

function renderCharts(groups) {
    let container = document.getElementById("chartsContainer");
    container.innerHTML = "";

    Object.values(groups).forEach((g, idx) => {

        let row = document.createElement("div");
        row.className = "row";

        let label = document.createElement("div");
        label.className = "label";
        label.innerText = `VRS:${g.H} HRS:${g.V}`;

        let charts = document.createElement("div");
        charts.className = "charts";

        let c1 = document.createElement("canvas");
        let c2 = document.createElement("canvas");
        let c3 = document.createElement("canvas");

        charts.appendChild(c1);
        charts.appendChild(c2);
        charts.appendChild(c3);

        row.appendChild(label);
        row.appendChild(charts);
        container.appendChild(row);

        drawChart(c1, g.x, g.freq, "Frequency (Hz)");
        drawChart(c2, g.x, g.s21, "S21 (dB)");
        drawChart(c3, null, g.d2, "Data2 (MLOG)");
    });
}

function drawChart(canvas, x, y, title) {

    // 如果没有 x，就自动生成序号
    if (!x || x.length === 0) {
        x = y.map((_, i) => i);
    }

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: x,
            datasets: [{
                data: y,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: title
                }
            },
            scales: {
                x: { display: true }
            }
        }
    });
}

// ================= 下载数据 =================

async function downloadJSON() {
    try {
        let res = await fetch('/data?ts=' + Date.now());
        let data = await res.json();

        // 转成字符串
        let jsonStr = JSON.stringify(data, null, 2);

        // 创建 Blob
        let blob = new Blob([jsonStr], { type: "application/json" });

        // 创建下载链接
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        let now = new Date();
        let filename = `data_${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}.json`;
        link.download = filename;

        // 触发下载
        link.click();

    } catch (e) {
        console.error("Download failed:", e);
        alert("Download failed");
    }
}
    
// ================= 自动轮询 =================

window.onload = () => {
    fetchData();
    setInterval(fetchData, 3000);
};

</script>

<script type="module">
// ================= 3D模型 =================
// ================= 3D模型 =================
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const container = document.getElementById("modelView");

// ===== 场景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// ===== 相机 =====
const camera = new THREE.PerspectiveCamera(
    60,
    container.clientWidth / container.clientHeight,
    0.1,
    100
);
camera.position.set(6, 4, 8);

// ===== 渲染器 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// ===== 光照 =====
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ======================================================
// ① 外框架（细长方体）
// ======================================================
const frameMat = new THREE.MeshStandardMaterial({ color: 0x8b0000 });

const frameGroup = new THREE.Group();
scene.add(frameGroup);

// 四边框
const edges = [
    // 底
    [3, 0.1, 2, 0, 0, 0],
    // 顶
    [3, 0.1, 2, 0, 2, 0],
    // 左
    [0.1, 2, 2, -1.5, 1, 0],
    // 右
    [0.1, 2, 2, 1.5, 1, 0],
];

edges.forEach(e => {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(e[0], e[1], e[2]),
        frameMat
    );
    mesh.position.set(e[3], e[4], e[5]);
    frameGroup.add(mesh);
});

// ======================================================
// ② 右后部结构（倾斜板 + 连接柱）
// ======================================================
const rightGroup = new THREE.Group();
rightGroup.position.set(0.8, 0.5, -0.4);
scene.add(rightGroup);

const plateMat = new THREE.MeshStandardMaterial({ color: 0x6a5acd });

// 两个倾斜板（30°）
for (let i = 0; i < 2; i++) {
    const plate = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.05, 0.6),
        plateMat
    );
    plate.rotation.z = Math.PI / 6; // 30°
    plate.position.set(0, i * 0.6, 0);
    rightGroup.add(plate);
}

// 连接柱
const pillar = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 1.2, 0.1),
    new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
);
pillar.position.set(0, 0.3, 0);
rightGroup.add(pillar);

// ======================================================
// ③ 左后部：可旋转模块（核心）
// ======================================================
const rotationGroup = new THREE.Group();
rotationGroup.position.set(-0.8, 1.2, 0.4);
scene.add(rotationGroup);

// ---- 圆柱 A（主轴）----
const cylA = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.2, 0.6, 32),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
);
rotationGroup.add(cylA);

// ---- 圆柱 B（横向）----
const cylB = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 1.2, 32),
    new THREE.MeshStandardMaterial({ color: 0x555555 })
);
cylB.rotation.z = Math.PI / 2;
rotationGroup.add(cylB);

// ---- 两个对称正方体 ----
const cubeMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });

const cube1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 0.3, 0.3),
    cubeMat
);
cube1.position.set(0.6, 0, 0);
rotationGroup.add(cube1);

const cube2 = cube1.clone();
cube2.position.set(-0.6, 0, 0);
rotationGroup.add(cube2);

// ======================================================
// ④ 旋转控制（你的 UI 保持不变）
// ======================================================
function updateRotation() {
    let vrs = parseInt(document.getElementById("vrs").value) || 0;
    let hrs = parseInt(document.getElementById("hrs").value) || 0;

    rotationGroup.rotation.y = vrs * Math.PI / 180;
    rotationGroup.rotation.x = hrs * Math.PI / 180;
}

document.getElementById("vrs").addEventListener("input", updateRotation);
document.getElementById("hrs").addEventListener("input", updateRotation);

// ======================================================
// 渲染循环
// ======================================================
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// 自适应
window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

</script>

</body>
</html>
