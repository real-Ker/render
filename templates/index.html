<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial;
        margin: 0;
        display: flex;
    }

    /* 左：command */
    .left {
        width: 25%;
        padding: 30px;
        border-right: 2px solid #ccc;
    }

    /* 中：data */
    .middle {
        width: 45%;
        padding: 20px;
        overflow-y: auto;
        height: 100vh;
        border-right: 2px solid #ccc;
    }

    /* 右：3D */
    .right {
        width: 30%;
        padding: 20px;
        height: 100vh;
    }

    /* 3D容器必须撑满 */
    #modelView {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
    }

    input, select, button {
        display: block;
        margin: 10px 0;
        padding: 8px;
        font-size: 16px;
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
    }

    .label {
        width: 120px;
        font-weight: bold;
    }

    .charts {
        display: flex;
        gap: 20px;
    }

    canvas {
        width: 250px !important;
        height: 200px !important;
    }
</style>
</head>

<body>

<!-- 左侧控制 -->
<div class="left">
    <h1>Control Panel</h1>

    <label>VRS (0–180, multiple of 10)</label>
    <input type="number" id="vrs" min="0" max="180" step="10">

    <label>HRS (0–180, multiple of 10)</label>
    <input type="number" id="hrs" min="0" max="180" step="10">

    <label>S (Shutdown)</label>
    <select id="shutdown">
        <option>No</option>
        <option>Yes</option>
    </select>

    <button onclick="startMeasurement()">Start Measurement</button>
</div>

<!-- 中间数据 -->
<div class="middle">
    <h1>Measured Data</h1>
    <button onclick="downloadJSON()">Download Data</button>
    <div id="chartsContainer"></div>
</div>

<!-- 右侧模型 -->
<div class="right">
    <h1>3D Model</h1>
    <div id="modelView" style="width:100%; height:300px; border:1px solid #ccc;"></div>
</div>

<script>

// ================= 控制部分 =================

function validateInput(v) {
    return v >= 0 && v <= 180 && v % 10 === 0;
}

function startMeasurement() {
    let vrs = parseInt(document.getElementById("vrs").value);
    let hrs = parseInt(document.getElementById("hrs").value);
    let shutdown = document.getElementById("shutdown").value;

    if (!validateInput(vrs) || !validateInput(hrs)) {
        alert("VRS and HRS must be between 0 and 180 and must be multiples of 10!");
        return;
    }

    let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
    let blob = new Blob([csv], {type:"text/csv"});

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "command.csv";
    link.click();
    
    let formData = new FormData();
    formData.append("file", blob, "command.csv");

    fetch("https://render-er7w.onrender.com/upload", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }
        return response.text();
    })
    .then(data => {
        console.log("Uploaded:", data);
        alert("Upload success!");
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Upload failed!");
    });
}

// ================= 数据绘图部分 =================

async function fetchData() {
    try {
        let res = await fetch("/data?ts=" + Date.now()); // 防缓存
        let json = await res.json();
        processData(json);
    } catch (e) {
        console.log("No data yet");
    }
}

function processData(data) {

    let groups = {};

    data.forEach(row => {
        let H = row.H;
        let V = row.V;
        let F = row.Frequency_Hz;
        let S21 = row.S21_dB;
        let D2 = row.Data2;

        let key = `${H}_${V}`;

        if (!groups[key]) {
            groups[key] = {
                H, V,
                // x: [],       // 统一x轴（index）
                freq: [],
                s21: [],
                d2: []
            };
        }

        let g = groups[key];

        // 情况1：正常测量点
        if (F !== 0) {
            // g.x.push(g.x.length);   // index
            g.freq.push(F);
            g.s21.push(S21);
        }

        // 情况2：Data2（MLOG）
        if (D2 !== 0) {
            g.d2.push(D2);
        }
    });

    renderCharts(groups);
}

function renderCharts(groups) {
    let container = document.getElementById("chartsContainer");
    container.innerHTML = "";

    Object.values(groups).forEach((g, idx) => {

        let row = document.createElement("div");
        row.className = "row";

        let label = document.createElement("div");
        label.className = "label";
        label.innerText = `VRS:${g.H} HRS:${g.V}`;

        let charts = document.createElement("div");
        charts.className = "charts";

        let c1 = document.createElement("canvas");
        let c2 = document.createElement("canvas");
        // let c3 = document.createElement("canvas");

        charts.appendChild(c1);
        charts.appendChild(c2);
        // charts.appendChild(c3);

        row.appendChild(label);
        row.appendChild(charts);
        container.appendChild(row);

        // drawChart(c1, g.x, g.freq, "Frequency (Hz)");
        drawChart(c1, g.freq, g.s21, "S21 (dB)");
        drawChart(c2, null, g.d2, "Data2 (MLOG)");
    });
}

function drawChart(canvas, x, y, title) {

    // // 如果没有 x，就自动生成序号
    // if (!x || x.length === 0) {
    //     x = y.map((_, i) => i);
    // }

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: x,
            datasets: [{
                data: y,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: title
                }
            },
            scales: {
                x: { display: true }
            }
        }
    });
}

// ================= 下载数据 =================

async function downloadJSON() {
    try {
        let res = await fetch('/data?ts=' + Date.now());
        let data = await res.json();

        // 转成字符串
        let jsonStr = JSON.stringify(data, null, 2);

        // 创建 Blob
        let blob = new Blob([jsonStr], { type: "application/json" });

        // 创建下载链接
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        let now = new Date();
        let filename = `data_${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}.json`;
        link.download = filename;

        // 触发下载
        link.click();

    } catch (e) {
        console.error("Download failed:", e);
        alert("Download failed");
    }
}
    
// ================= 自动轮询 =================

window.onload = () => {
    fetchData();
    setInterval(fetchData, 3000);
};

</script>

<script type="module">
// ================= 3D轮询 =================

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const container = document.getElementById("modelView");

// ===== 场景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// ===== 相机 =====
const camera = new THREE.PerspectiveCamera(60, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(5, 4, 6);

// ===== 渲染器 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// ===== 光 =====
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ======================================================
//  ① VRS轴（底部水平轴）
// ======================================================
const basePivot = new THREE.Group();
basePivot.position.set(0, 0, 0); // 地面位置
scene.add(basePivot);

// ======================================================
//  ② HRS轴（T中轴）
// ======================================================
const hrsPivot = new THREE.Group();
hrsPivot.position.set(0, 1, 0); // T 的底部到中轴高度
basePivot.add(hrsPivot);

// ======================================================
//  ③ 模型主体
// ======================================================
const model = new THREE.Group();
hrsPivot.add(model);

// ===== 材质 =====
const metal = new THREE.MeshStandardMaterial({ color: 0x888888 });
const shellMat = new THREE.MeshStandardMaterial({ color: 0x3366ff });

// ===== T竖杆 =====
const vertical = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 2, 0.2),
    metal
);
vertical.position.set(0, 1, 0);
model.add(vertical);

// ===== T横杆 =====
const horizontal = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.3, 0.2),
    metal
);
horizontal.position.set(0, 2, 0);
model.add(horizontal);

// ===== 两个壳（对称）=====
function createShell(x) {
    const shell = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.5, 0.4),
        shellMat
    );
    shell.position.set(x, 2, 0.3); // 在同一面（+Z）
    return shell;
}

model.add(createShell(0.6));
model.add(createShell(-0.6));

// ======================================================
//  控制旋转
// ======================================================
function updateRotation() {
    let vrs = parseFloat(document.getElementById("vrs").value) || 0;
    let hrs = parseFloat(document.getElementById("hrs").value) || 0;

    // VRS：底部轴
    basePivot.rotation.x = vrs * Math.PI / 180;

    // HRS：中轴
    hrsPivot.rotation.y = hrs * Math.PI / 180;
}

document.getElementById("vrs").addEventListener("input", updateRotation);
document.getElementById("hrs").addEventListener("input", updateRotation);

// ===== 渲染 =====
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// 自适应
window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>

</body>
</html>
