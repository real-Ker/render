<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ===== 左 ===== */
.left {
    flex: 0 0 260px;
    padding: 20px;
    border-right: 2px solid #ccc;
}

/* ===== 中 ===== */
.middle {
    flex: 1;
    padding: 20px;
    border-right: 2px solid #ccc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* 横向滚动容器 */
#chartsContainer {
    flex: 1;
    overflow-x: auto;
    overflow-y: auto;
}

/* ===== 右 ===== */
.right {
    flex: 0 0 30%;
    min-width: 300px;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* 3D区域自适应 */
#modelView {
    flex: 1;
    width: 100%;
    border: 1px solid #ccc;
}

/* 表单 */
input, select, button {
    display: block;
    margin: 10px 0;
    padding: 8px;
    font-size: 16px;
}

/* 每一组图 */
.row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 30px;
    min-width: 700px; /* 关键：触发横向滚动 */
}

/* 标签 */
.label {
    width: 120px;
    font-weight: bold;
    flex-shrink: 0;
}

/* 图表区域 */
.charts {
    display: flex;
    gap: 20px;
}

/* canvas 自适应 */
canvas {
    width: 300px !important;
    height: 200px !important;
    flex-shrink: 0;
}

/* 小屏优化 */
@media (max-width: 900px) {
    body {
        flex-direction: column;
    }

    .left, .middle, .right {
        width: 100%;
        flex: none;
        border-right: none;
        border-bottom: 2px solid #ccc;
    }

    .row {
        min-width: 900px;
    }
}
</style>
</head>

<body>

<!-- 左 -->
<div class="left">
    <h1>Control Panel</h1>

    <label>VRS (0–180, multiple of 10)</label>
    <input type="number" id="vrs" min="0" max="180" step="10">

    <label>HRS (0–180, multiple of 10)</label>
    <input type="number" id="hrs" min="0" max="180" step="10">

    <label>S (Shutdown)</label>
    <select id="shutdown">
        <option>No</option>
        <option>Yes</option>
    </select>

    <button onclick="startMeasurement()">Start Measurement</button>
</div>

<!-- 中 -->
<div class="middle">
    <h1>Measured Data</h1>
    <button onclick="downloadJSON()">Download Data</button>
    <div id="chartsContainer"></div>
</div>

<!-- 右 -->
<div class="right">
    <h1>3D Model</h1>
    <div id="modelView"></div>
</div>

<script>
// ================= 控制 =================
function validateInput(v) {
    return v >= 0 && v <= 180 && v % 10 === 0;
}

function startMeasurement() {
    let vrs = parseInt(document.getElementById("vrs").value);
    let hrs = parseInt(document.getElementById("hrs").value);
    let shutdown = document.getElementById("shutdown").value;

    if (!validateInput(vrs) || !validateInput(hrs)) {
        alert("Invalid input!");
        return;
    }

    let csv = `vrs,hrs,shutdown\n${vrs/10},${hrs/10},${shutdown==="Yes"?1:0}`;
    let blob = new Blob([csv], {type:"text/csv"});

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "command.csv";
    link.click();

    let formData = new FormData();
    formData.append("file", blob, "command.csv");

    fetch("https://render-er7w.onrender.com/upload", {
        method: "POST",
        body: formData
    });
}

// ================= 数据 =================
async function fetchData() {
    try {
        let res = await fetch("/data?ts=" + Date.now());
        let json = await res.json();
        processData(json);
    } catch {}
}

function processData(data) {
    let groups = {};

    data.forEach(row => {
        let key = `${row.H}_${row.V}`;
        if (!groups[key]) {
            groups[key] = { H: row.H, V: row.V, x: [], freq: [], s21: [], d2: [] };
        }

        let g = groups[key];

        if (row.Frequency_Hz !== 0) {
            g.x.push(g.x.length);
            g.freq.push(row.Frequency_Hz);
            g.s21.push(row.S21_dB);
        }

        if (row.Data2 !== 0) {
            g.d2.push(row.Data2);
        }
    });

    renderCharts(groups);
}

function renderCharts(groups) {
    let container = document.getElementById("chartsContainer");
    container.innerHTML = "";

    Object.values(groups).forEach(g => {

        let row = document.createElement("div");
        row.className = "row";

        let label = document.createElement("div");
        label.className = "label";
        label.innerText = `VRS:${g.H} HRS:${g.V}`;

        let charts = document.createElement("div");
        charts.className = "charts";

        let c1 = document.createElement("canvas");
        let c2 = document.createElement("canvas");
        let c3 = document.createElement("canvas");

        charts.append(c1, c2, c3);
        row.append(label, charts);
        container.appendChild(row);

        drawChart(c1, g.x, g.freq, "Frequency");
        drawChart(c2, g.x, g.s21, "S21");
        drawChart(c3, null, g.d2, "Data2");
    });
}

function drawChart(canvas, x, y, title) {
    if (!x || x.length === 0) {
        x = y.map((_, i) => i);
    }

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: x,
            datasets: [{ data: y }]
        },
        options: {
            responsive: false
        }
    });
}

// ================= 下载 =================
async function downloadJSON() {
    let res = await fetch('/data');
    let data = await res.json();

    let blob = new Blob([JSON.stringify(data, null, 2)]);
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "data.json";
    link.click();
}

// ================= 自动刷新 =================
window.onload = () => {
    fetchData();
    setInterval(fetchData, 3000);
};
</script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const container = document.getElementById("modelView");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(6,4,8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
container.appendChild(renderer.domElement);

function resize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
resize();
window.addEventListener("resize", resize);

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));

const box = new THREE.Mesh(
    new THREE.BoxGeometry(),
    new THREE.MeshStandardMaterial({color:0x00aaff})
);
scene.add(box);

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
